type: object
required:
  - user_uuid
  - part_uuids
properties:
  user_uuid:
    type: string
    format: uuid
    description: User UUID
    example: "22222222-2222-2222-2222-222222222222"
  part_uuids:
    type: array
    description: Selected spaceship part UUIDs
    minItems: 1
    items:
      type: string
      format: uuid
    example:
      - "33333333-3333-3333-3333-333333333333"
      - "44444444-4444-4444-4444-444444444444"
