type: object
required:
  - order_uuid
  - user_uuid
  - part_uuids
  - total_price
  - status
properties:
  order_uuid:
    type: string
    format: uuid
    description: Order UUID
    example: "11111111-1111-1111-1111-111111111111"
  user_uuid:
    type: string
    format: uuid
    description: User UUID
    example: "22222222-2222-2222-2222-222222222222"
  part_uuids:
    type: array
    description: Selected spaceship part UUIDs
    minItems: 1
    items:
      type: string
      format: uuid
    example:
      - "33333333-3333-3333-3333-333333333333"
      - "44444444-4444-4444-4444-444444444444"
  total_price:
    type: number
    format: double
    minimum: 0
    description: Total order price
    example: 123.45
  transaction_uuid:
    type: string
    format: uuid
    description: Payment transaction UUID
    example: "55555555-5555-5555-5555-555555555555"
  payment_method:
    $ref: ./enums/payment_method.yaml
  status:
    $ref: ./enums/order_status.yaml
