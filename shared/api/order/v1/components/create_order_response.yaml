type: object
required:
  - order_uuid
  - total_price
properties:
  order_uuid:
    type: string
    format: uuid
    description: Created order UUID
    example: "11111111-1111-1111-1111-111111111111"
  total_price:
    type: number
    format: double
    minimum: 0
    description: Total order price
    example: 123.45
