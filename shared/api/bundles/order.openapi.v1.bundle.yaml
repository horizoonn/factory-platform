openapi: 3.0.3
info:
  title: OrderService API
  version: 1.0.0
  description: API for managing spaceship build orders
tags:
  - name: Orders
    description: Operations with spaceship build orders
paths:
  /api/v1/orders:
    post:
      summary: Create order
      operationId: CreateOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_order_request'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create_order_response'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /api/v1/orders/{order_uuid}:
    parameters:
      - $ref: '#/components/parameters/order_uuid'
    get:
      summary: Get order by id
      operationId: GetOrder
      tags:
        - Orders
      responses:
        '200':
          description: Order info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order_dto'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /api/v1/orders/{order_uuid}/pay:
    parameters:
      - $ref: '#/components/parameters/order_uuid'
    post:
      summary: Pay order
      operationId: PayOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pay_order_request'
      responses:
        '200':
          description: Order paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pay_order_response'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
        '409':
          description: Order cannot be paid in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/conflict_error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /api/v1/orders/{order_uuid}/cancel:
    parameters:
      - $ref: '#/components/parameters/order_uuid'
    post:
      summary: Cancel order
      operationId: CancelOrder
      tags:
        - Orders
      responses:
        '204':
          description: Order canceled
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
        '409':
          description: Order has already paid and cannot be canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/conflict_error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
components:
  schemas:
    create_order_request:
      type: object
      required:
        - user_uuid
        - part_uuids
      properties:
        user_uuid:
          type: string
          format: uuid
          description: User UUID
          example: 22222222-2222-2222-2222-222222222222
        part_uuids:
          type: array
          description: Selected spaceship part UUIDs
          minItems: 1
          items:
            type: string
            format: uuid
          example:
            - 33333333-3333-3333-3333-333333333333
            - 44444444-4444-4444-4444-444444444444
    generic_error:
      type: object
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Error message
    create_order_response:
      type: object
      required:
        - order_uuid
        - total_price
      properties:
        order_uuid:
          type: string
          format: uuid
          description: Created order UUID
          example: 11111111-1111-1111-1111-111111111111
        total_price:
          type: number
          format: double
          minimum: 0
          description: Total order price
          example: 123.45
    bad_request_error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 400
        message:
          type: string
          description: Error message
          example: Bad request
    internal_server_error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 500
        message:
          type: string
          description: Error message
          example: Internal server error
    payment_method:
      type: string
      description: Payment method
      enum:
        - CARD
        - SBP
        - CREDIT_CARD
        - INVESTOR_MONEY
      example: CARD
    order_status:
      type: string
      description: Order status
      enum:
        - PENDING_PAYMENT
        - PAID
        - COMPLETED
        - CANCELLED
      example: PENDING_PAYMENT
    order_dto:
      type: object
      required:
        - order_uuid
        - user_uuid
        - part_uuids
        - total_price
        - status
      properties:
        order_uuid:
          type: string
          format: uuid
          description: Order UUID
          example: 11111111-1111-1111-1111-111111111111
        user_uuid:
          type: string
          format: uuid
          description: User UUID
          example: 22222222-2222-2222-2222-222222222222
        part_uuids:
          type: array
          description: Selected spaceship part UUIDs
          minItems: 1
          items:
            type: string
            format: uuid
          example:
            - 33333333-3333-3333-3333-333333333333
            - 44444444-4444-4444-4444-444444444444
        total_price:
          type: number
          format: double
          minimum: 0
          description: Total order price
          example: 123.45
        transaction_uuid:
          type: string
          format: uuid
          description: Payment transaction UUID
          example: 55555555-5555-5555-5555-555555555555
        payment_method:
          $ref: '#/components/schemas/payment_method'
        status:
          $ref: '#/components/schemas/order_status'
    not_found_error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 404
        message:
          type: string
          description: Error message
          example: Order not found
    pay_order_request:
      type: object
      required:
        - payment_method
      properties:
        payment_method:
          $ref: '#/components/schemas/payment_method'
    pay_order_response:
      type: object
      required:
        - transaction_uuid
      properties:
        transaction_uuid:
          type: string
          format: uuid
          description: Payment transaction UUID
          example: 55555555-5555-5555-5555-555555555555
    conflict_error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code
          example: 409
        message:
          type: string
          description: Error message
          example: Paid order cannot be canceled
  parameters:
    order_uuid:
      name: order_uuid
      in: path
      required: true
      description: Order UUID
      schema:
        type: string
        format: uuid
        example: 11111111-1111-1111-1111-111111111111
x-ogen:
  target: ./shared/pkg/openapi/order/v1
  package: order_v1
  clean: true
