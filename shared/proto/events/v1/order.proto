syntax = "proto3";

package events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/horizoonn/factory-platform/shared/pkg/proto/events/v1;eventsv1";

// OrderPaid — событие успешной оплаты заказа.
message OrderPaid {
    string event_uuid = 1;
    string order_uuid = 2;
    string user_uuid = 3;
    string payment_method = 4;
    string transaction_uuid = 5;
    google.protobuf.Timestamp occurred_at = 6;
}

// ShipAssembled — событие завершения сборки корабля.
message ShipAssembled {
    string event_uuid = 1;
    string order_uuid = 2;
    string user_uuid = 3;
    int64 build_time_sec = 4;
    google.protobuf.Timestamp occurred_at = 5;
}