version: v2

clean: true

inputs:
  - directory: .
    paths:
      - events
      - inventory
      - payment

plugins:
  - local: ../../bin/protoc-gen-go
    out: ../pkg/proto
    opt:
      - paths=source_relative
  - local: ../../bin/protoc-gen-go-grpc
    out: ../pkg/proto
    opt:
      - paths=source_relative
  - local: ../../bin/protoc-gen-grpc-gateway
    out: ../pkg/proto
    opt:
      - paths=source_relative
  - local: ../../bin/protoc-gen-openapiv2
    out: ../api/generated
    types:
      - inventory.v1.InventoryService
