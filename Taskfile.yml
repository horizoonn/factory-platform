version: '3'

# Глобальные переменные проекта
vars:
  GO_VERSION: '1.26.2'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.10.0'
  BUF_VERSION: '1.69.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  GOOSE_VERSION: 'v3.27.1'
  OGEN_VERSION: 'v1.22.0'
  YQ_VERSION: 'v4.45.2'
  GRPCURL_VERSION: 'v1.9.3'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  BUF: '{{.BIN_DIR}}/buf'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc'
  GOOSE: '{{.BIN_DIR}}/goose'
  OGEN: '{{.BIN_DIR}}/ogen'
  YQ: '{{.BIN_DIR}}/yq'
  GRPCURL: '{{.BIN_DIR}}/grpcurl'

  NODE_MODULES_DIR: '{{.ROOT_DIR}}/node_modules/.bin'
  REDOCLY: '{{.NODE_MODULES_DIR}}/redocly'

  OPEN_API_ORDER_V1_BASE: '{{.ROOT_DIR}}/shared/api/order/v1/order.openapi.yaml'
  OPEN_API_ORDER_V1_BUNDLE: '{{.ROOT_DIR}}/shared/api/bundles/order.openapi.v1.bundle.yaml'
  OPEN_API_FILES: '{{.ROOT_DIR}}/shared/api/bundles'

  MODULES: assembly inventory order payment platform iam notification shared

tasks:
  install-formatters:
    desc: "Установка форматтеров gci и gofumpt в ./bin"
    cmds:
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo '📦 Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
        [ -f {{.GCI}} ] || {
          echo '📦 Устанавливаем gci {{.GCI_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  format:
    desc: "Форматирование всего проекта gofumpt + gci, исключая mocks"
    deps: [ install-formatters ]
    cmds:
      - |
        echo "🧼 Форматируем через gofumpt ..."
        
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🧼 Форматируем $module"
            find $module -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
          fi
        done
      - |
        echo "🎯 Сортируем импорты через gci ..."
        
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🎯 Сортируем импорты в $module"
            find $module -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/horizoonn/factory-platform.git)" {} +
          fi
        done

  install-golangci-lint:
    desc: "Установка golangci-lint в каталог bin"
    cmds:
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          mkdir -p {{.BIN_DIR}}
          echo "📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  lint:
    desc: "Запуск golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    vars:
      MODULES: '{{.MODULES}}'
      GOLANGCI_LINT: '{{.GOLANGCI_LINT}}'
    cmds:
      - |
        set -e
        ERR=0
        echo "🔍 Линтим все модули ..."
        for mod in {{.MODULES}}; do
          if [ ! -d "$mod" ]; then
            continue
          fi

          if ! find "$mod" -type f -name '*.go' ! -path '*/mocks/*' | grep -q .; then
            echo "⏭️ Пропускаем $mod: нет Go-файлов"
            continue
          fi

          echo "🔍 Линтим $mod module"
          {{.GOLANGCI_LINT}} run $mod/... --config=.golangci.yml || ERR=1
        done
        exit $ERR
  
  install-buf:
    desc: "Установка Buf в каталог bin"
    cmds:
      - |
        [ -f {{.BUF}} ] || {
          mkdir -p {{.BIN_DIR}} tmp-buf
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-$(uname -s)-$(uname -m).tar.gz" \
            | tar -xz -C tmp-buf
          mv tmp-buf/buf/bin/buf {{.BUF}}
          rm -rf tmp-buf
          chmod +x {{.BUF}}
        }

  proto:install-plugins:
    desc: "Установка protoc плагинов в каталог bin"
    cmds:
      - |
        [ -f {{.PROTOC_GEN_GO}} ] || {
          echo '📦 Installing protoc-gen-go...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        }
        [ -f {{.PROTOC_GEN_GO_GRPC}} ] || {
          echo '📦 Installing protoc-gen-go-grpc...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
        }

  proto:gen:
    deps: [ install-buf, proto:install-plugins, proto:lint ]
    desc: Генерация Go-кода из .proto
    dir: shared/proto
    cmds:
      - '{{.BUF}} generate'

  proto:lint:
    deps: [ install-buf ]
    desc: Проверка .proto-файлов на соответствие стилю
    dir: shared/proto
    cmds:
      - '{{.BUF}} lint'

  redocly-cli:install:
    desc: Установка Redocly CLI локально через npm
    cmds:
      - |
        [ -f {{.REDOCLY}} ] || {
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        }

  redocly-cli:order-v1-bundle:
    desc: Сборка OpenAPI контракта OrderService в один файл
    deps: [ redocly-cli:install ]
    cmds:
      - '{{.REDOCLY}} bundle {{.OPEN_API_ORDER_V1_BASE}} -o {{.OPEN_API_ORDER_V1_BUNDLE}}'

  redocly-cli:bundle:
    desc: Сборка всех OpenAPI контрактов в bundle-файлы
    deps: [ redocly-cli:install ]
    cmds:
      - task: redocly-cli:order-v1-bundle

  ogen:install:
    desc: "Установка ogen в каталог bin"
    cmds:
      - |
        [ -f {{.OGEN}} ] || {
          mkdir -p {{.BIN_DIR}}
          GOBIN={{.BIN_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
        }
    status:
      - test -x {{.OGEN}}

  yq:install:
    desc: "Установка yq в каталог bin"
    cmds:
      - |
        [ -f {{.YQ}} ] || {
          mkdir -p {{.BIN_DIR}}
          GOBIN={{.BIN_DIR}} go install github.com/mikefarah/yq/v4@{{.YQ_VERSION}}
        }
    status:
      - test -x {{.YQ}}

  ogen:gen:
    desc: "Генерация Go-кода из OpenAPI контрактов с x-ogen"
    deps: [ ogen:install, yq:install ]
    cmds:
      - task: redocly-cli:bundle
      - |
        find {{.OPEN_API_FILES}} -name '*.yaml' -o -name '*.yml' | while read -r file; do
          if [ -f "$file" ] && grep -q 'x-ogen:' "$file"; then
            echo "🚀 Generating from: $file"
            target=$({{.YQ}} e '."x-ogen".target' "$file")
            package=$({{.YQ}} e '."x-ogen".package' "$file")
            echo "📁 Target: $target"
            echo "📦 Package: $package"
            {{.OGEN}} \
              --target "$target" \
              --package "$package" \
              --clean \
              "$file" || exit 1
          fi
        done

  gen:
    desc: "Генерация всех proto и OpenAPI деклараций"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  deps:update:
    desc: "Обновление зависимостей в go.mod во всех модулях"
    cmds:
      - |
        echo "🔄 Обновление зависимостей в go.mod во всех модулях"
        for mod in {{.MODULES}}; do
          if [ -d "$mod" ]; then
            echo "🔄 Обновление зависимостей в $mod"
            (cd "$mod" && go mod tidy -compat=1.26) || exit 1
          fi
        done

  run:inventory:
    desc: "Запуск InventoryService локально"
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        (cd inventory && go run ./cmd)

  run:payment:
    desc: "Запуск PaymentService локально"
    dotenv: ['deploy/env/payment.env']
    preconditions:
      - sh: test -f deploy/env/payment.env
        msg: "Создай deploy/env/payment.env из payment.env.example"
    cmds:
      - |
        (cd payment && go run ./cmd)
  
  install-goose:
    desc: "Установка goose в каталог bin"
    cmds:
      - |
        [ -f {{.GOOSE}} ] || {
          echo "📦 Устанавливаем goose {{.GOOSE_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
        }
    status:
      - test -x {{.GOOSE}}

  db:migrate:inventory:
    desc: "Запуск миграций inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          up

  db:status:inventory:
    desc: "Статус миграций inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          status

  db:rollback:inventory:
    desc: "Откат последней миграции inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          down

  grpcurl:install:
    desc: "Установка grpcurl в каталог bin"
    cmds:
      - |
        [ -f {{.GRPCURL}} ] || {
          echo '📦 Устанавливаем grpcurl {{.GRPCURL_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/fullstorydev/grpcurl/cmd/grpcurl@{{.GRPCURL_VERSION}}
        }
    status:
      - test -x {{.GRPCURL}}

  test-api:
    desc: "Ручная проверка Inventory, Payment и Order API"
    deps: [ grpcurl:install ]
    cmds:
      - |
        set -e

        echo "🧪 Проверяем InventoryService через gRPC"
        PARTS_RESPONSE=$({{.GRPCURL}} -plaintext -d '{"filter":{}}' localhost:50051 inventory.v1.InventoryService/ListParts)
        PART_UUID=$(echo "$PARTS_RESPONSE" | grep -o '"uuid": "[^"]*' | head -1 | cut -d'"' -f4)

        if [ -z "$PART_UUID" ]; then
          echo "❌ Не удалось получить UUID детали из InventoryService"
          echo "$PARTS_RESPONSE"
          exit 1
        fi

        echo "✅ Найдена деталь: $PART_UUID"

        USER_UUID=$(uuidgen | tr '[:upper:]' '[:lower:]')

        echo "🧪 Создаем заказ через OrderService"
        ORDER_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER_UUID=$(echo "$ORDER_RESPONSE" | grep -o '"order_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER_UUID" ]; then
          ORDER_UUID=$(echo "$ORDER_RESPONSE" | grep -o '"order_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$ORDER_UUID" ]; then
          echo "❌ Не удалось создать заказ или извлечь order_uuid"
          echo "$ORDER_RESPONSE"
          exit 1
        fi

        echo "✅ Создан заказ: $ORDER_UUID"

        echo "🧪 Получаем заказ"
        ORDER_INFO_RESPONSE=$(curl -s -X GET "http://localhost:8080/api/v1/orders/$ORDER_UUID")
        ORDER_STATUS=$(echo "$ORDER_INFO_RESPONSE" | grep -o '"status":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER_STATUS" ]; then
          ORDER_STATUS=$(echo "$ORDER_INFO_RESPONSE" | grep -o '"status": "[^"]*' | cut -d'"' -f4)
        fi

        if [ "$ORDER_STATUS" != "PENDING_PAYMENT" ]; then
          echo "❌ Ожидался статус PENDING_PAYMENT, получен: $ORDER_STATUS"
          echo "$ORDER_INFO_RESPONSE"
          exit 1
        fi

        echo "✅ Начальный статус корректный: $ORDER_STATUS"

        echo "🧪 Оплачиваем заказ"
        PAY_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders/$ORDER_UUID/pay" \
          -H "Content-Type: application/json" \
          -d '{"payment_method":"CARD"}')
        TRANSACTION_UUID=$(echo "$PAY_RESPONSE" | grep -o '"transaction_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$TRANSACTION_UUID" ]; then
          TRANSACTION_UUID=$(echo "$PAY_RESPONSE" | grep -o '"transaction_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$TRANSACTION_UUID" ]; then
          echo "❌ Не удалось оплатить заказ или извлечь transaction_uuid"
          echo "$PAY_RESPONSE"
          exit 1
        fi

        echo "✅ Заказ оплачен, transaction_uuid: $TRANSACTION_UUID"

        echo "🧪 Создаем второй заказ для отмены"
        ORDER2_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER2_UUID=$(echo "$ORDER2_RESPONSE" | grep -o '"order_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER2_UUID" ]; then
          ORDER2_UUID=$(echo "$ORDER2_RESPONSE" | grep -o '"order_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$ORDER2_UUID" ]; then
          echo "❌ Не удалось создать второй заказ"
          echo "$ORDER2_RESPONSE"
          exit 1
        fi

        CANCEL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://localhost:8080/api/v1/orders/$ORDER2_UUID/cancel")

        if [ "$CANCEL_STATUS" != "204" ]; then
          echo "❌ Ожидался HTTP 204 при отмене, получен: $CANCEL_STATUS"
          exit 1
        fi

        echo "✅ Второй заказ отменен"
        echo "🎉 Базовая API-проверка завершена"
