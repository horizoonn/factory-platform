version: '3'

# Глобальные переменные проекта
vars:
  GO_VERSION: '1.26.2'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.10.0'
  BUF_VERSION: '1.69.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  GOOSE_VERSION: 'v3.27.1'
  OGEN_VERSION: 'v1.22.0'
  YQ_VERSION: 'v4.45.2'
  GRPCURL_VERSION: 'v1.9.3'
  MOCKERY_VERSION: 'v3.7.1'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  BUF: '{{.BIN_DIR}}/buf'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc'
  GOOSE: '{{.BIN_DIR}}/goose'
  OGEN: '{{.BIN_DIR}}/ogen'
  YQ: '{{.BIN_DIR}}/yq'
  GRPCURL: '{{.BIN_DIR}}/grpcurl'
  MOCKERY: "{{.BIN_DIR}}/mockery"

  NODE_MODULES_DIR: '{{.ROOT_DIR}}/node_modules/.bin'
  REDOCLY: '{{.NODE_MODULES_DIR}}/redocly'

  OPEN_API_ORDER_V1_BASE: '{{.ROOT_DIR}}/shared/api/order/v1/order.openapi.yaml'
  OPEN_API_ORDER_V1_BUNDLE: '{{.ROOT_DIR}}/shared/api/bundles/order.openapi.v1.bundle.yaml'
  OPEN_API_FILES: '{{.ROOT_DIR}}/shared/api/bundles'
  COVERAGE_DIR: '{{.ROOT_DIR}}/coverage'
  COVERAGE_FILE: total.out

  COMPOSE_NETWORK: microservices-net
  INVENTORY_ENV_FILE: '{{.ROOT_DIR}}/deploy/env/inventory.env'
  ORDER_ENV_FILE: '{{.ROOT_DIR}}/deploy/env/order.env'
  INVENTORY_COMPOSE_FILE: '{{.ROOT_DIR}}/deploy/compose/inventory/docker-compose.yaml'
  ORDER_COMPOSE_FILE: '{{.ROOT_DIR}}/deploy/compose/order/docker-compose.yaml'

  MODULES: assembly inventory order payment platform iam notification shared

tasks:
  install-formatters:
    desc: "Установка форматтеров gci и gofumpt в ./bin"
    cmds:
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo '📦 Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
        [ -f {{.GCI}} ] || {
          echo '📦 Устанавливаем gci {{.GCI_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  format:
    desc: "Форматирование всего проекта gofumpt + gci, исключая mocks"
    deps: [ install-formatters ]
    cmds:
      - |
        echo "🧼 Форматируем через gofumpt ..."
        
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🧼 Форматируем $module"
            find $module -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
          fi
        done
      - |
        echo "🎯 Сортируем импорты через gci ..."
        
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🎯 Сортируем импорты в $module"
            find $module -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/horizoonn/factory-platform)" {} +
          fi
        done

  install-golangci-lint:
    desc: "Установка golangci-lint в каталог bin"
    cmds:
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          mkdir -p {{.BIN_DIR}}
          echo "📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  lint:
    desc: "Запуск golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    vars:
      MODULES: '{{.MODULES}}'
      GOLANGCI_LINT: '{{.GOLANGCI_LINT}}'
    cmds:
      - |
        set -e
        ERR=0
        echo "🔍 Линтим все модули ..."
        for mod in {{.MODULES}}; do
          if [ ! -d "$mod" ]; then
            continue
          fi

          if ! find "$mod" -type f -name '*.go' ! -path '*/mocks/*' | grep -q .; then
            echo "⏭️ Пропускаем $mod: нет Go-файлов"
            continue
          fi

          echo "🔍 Линтим $mod module"
          {{.GOLANGCI_LINT}} run $mod/... --config=.golangci.yml || ERR=1
        done
        exit $ERR
  
  install-buf:
    desc: "Установка Buf в каталог bin"
    cmds:
      - |
        [ -f {{.BUF}} ] || {
          mkdir -p {{.BIN_DIR}} tmp-buf
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-$(uname -s)-$(uname -m).tar.gz" \
            | tar -xz -C tmp-buf
          mv tmp-buf/buf/bin/buf {{.BUF}}
          rm -rf tmp-buf
          chmod +x {{.BUF}}
        }

  proto:install-plugins:
    desc: "Установка protoc плагинов в каталог bin"
    cmds:
      - |
        [ -f {{.PROTOC_GEN_GO}} ] || {
          echo '📦 Installing protoc-gen-go...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        }
        [ -f {{.PROTOC_GEN_GO_GRPC}} ] || {
          echo '📦 Installing protoc-gen-go-grpc...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
        }

  proto:update-deps:
    deps: [ install-buf ]
    desc: Обновление зависимостей protobuf из удаленных репозиториев (googleapis и т.д.)
    dir: shared/proto
    cmds:
      - |
        echo "🔄 Обновляем зависимости buf..."
        {{.BUF}} dep update

  proto:gen:
    deps: [ proto:install-plugins ]
    desc: Генерация Go-кода из .proto
    dir: shared/proto
    cmds:
      - task: proto:update-deps
      - task: proto:lint
      - '{{.BUF}} generate'

  proto:lint:
    deps: [ install-buf ]
    desc: Проверка .proto-файлов на соответствие стилю
    dir: shared/proto
    cmds:
      - '{{.BUF}} lint'

  redocly-cli:install:
    desc: Установка Redocly CLI локально через npm
    cmds:
      - |
        [ -f {{.REDOCLY}} ] || {
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        }

  redocly-cli:order-v1-bundle:
    desc: Сборка OpenAPI контракта OrderService в один файл
    deps: [ redocly-cli:install ]
    cmds:
      - '{{.REDOCLY}} bundle {{.OPEN_API_ORDER_V1_BASE}} -o {{.OPEN_API_ORDER_V1_BUNDLE}}'

  redocly-cli:bundle:
    desc: Сборка всех OpenAPI контрактов в bundle-файлы
    deps: [ redocly-cli:install ]
    cmds:
      - task: redocly-cli:order-v1-bundle

  ogen:install:
    desc: "Установка ogen в каталог bin"
    cmds:
      - |
        [ -f {{.OGEN}} ] || {
          mkdir -p {{.BIN_DIR}}
          GOBIN={{.BIN_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
        }
    status:
      - test -x {{.OGEN}}

  yq:install:
    desc: "Установка yq в каталог bin"
    cmds:
      - |
        [ -f {{.YQ}} ] || {
          mkdir -p {{.BIN_DIR}}
          GOBIN={{.BIN_DIR}} go install github.com/mikefarah/yq/v4@{{.YQ_VERSION}}
        }
    status:
      - test -x {{.YQ}}

  ogen:gen:
    desc: "Генерация Go-кода из OpenAPI контрактов с x-ogen"
    deps: [ ogen:install, yq:install ]
    cmds:
      - task: redocly-cli:bundle
      - |
        find {{.OPEN_API_FILES}} -name '*.yaml' -o -name '*.yml' | while read -r file; do
          if [ -f "$file" ] && grep -q 'x-ogen:' "$file"; then
            echo "🚀 Generating from: $file"
            target=$({{.YQ}} e '."x-ogen".target' "$file")
            package=$({{.YQ}} e '."x-ogen".package' "$file")
            echo "📁 Target: $target"
            echo "📦 Package: $package"
            {{.OGEN}} \
              --target "$target" \
              --package "$package" \
              --clean \
              "$file" || exit 1
          fi
        done

  gen:
    desc: "Генерация всех proto и OpenAPI деклараций"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  mockery:install:
    desc: "Установка mockery в ./bin"
    cmds:
      - |
        [ -f {{.MOCKERY}} ] || {
          echo '📦 Installing mockery...'
          GOBIN={{.BIN_DIR}} go install github.com/vektra/mockery/v3@{{.MOCKERY_VERSION}}
        }
    status:
      - test -x {{.MOCKERY}}

  mockery:gen:
    desc: "Генерация моков интерфейсов с помощью mockery"
    deps: [ mockery:install ]
    cmds:
      - |
        echo '🧪 Генерация моков...'
        {{.MOCKERY}}

  test-coverage:
    desc: "Тесты с покрытием бизнес-логики (service/repository), отчёт по каждому модулю + общий"
    cmds:
      - |
        echo "🧪 Запускаем расчёт покрытия..."
        rm -rf {{.COVERAGE_DIR}}
        mkdir -p {{.COVERAGE_DIR}}
        
        ERR=0
        for mod in {{.MODULES}}; do
          echo "📦 Обрабатываем модуль: $mod"

          if [ ! -d "$mod" ] || [ ! -f "$mod/go.mod" ]; then
            echo "⏭️  Пропускаем $mod: модуль не найден"
            continue
          fi
        
          TARGET_PKGS=$(go list ./$mod/... \
            | grep -E '/(internal/(service|repository))' \
            | grep -vE '/(mocks|testdata|pkg|api|proto|pb|cmd)' \
            | paste -sd "," -)
        
          if [ -z "$TARGET_PKGS" ]; then
            echo "⚠️  Нет подходящих пакетов в $mod"
            continue
          fi
        
          go test -coverpkg="$TARGET_PKGS" \
            -coverprofile={{.COVERAGE_DIR}}/$mod.out \
            -covermode=atomic \
            $(echo "$TARGET_PKGS" | tr "," " ") || ERR=1
        done
        
        if [ $ERR -ne 0 ]; then
          echo "❌ Ошибки во время тестов"
          exit $ERR
        fi
        
        echo
        echo "📊 Покрытие по каждому модулю:"
        for mod in {{.MODULES}}; do
          OUTFILE="{{.COVERAGE_DIR}}/$mod.out"
          if [ -f "$OUTFILE" ]; then
            printf " • %s: " "$mod"
            go tool cover -func="$OUTFILE" | tail -n1
          fi
        done
        
        echo
        echo "📦 Склеиваем все покрытия..."
        {
          echo "mode: atomic"
          find {{.COVERAGE_DIR}} -type f -name '*.out' ! -name '{{.COVERAGE_FILE}}' \
            -exec grep -h -v "^mode:" {} +
        } > {{.COVERAGE_DIR}}/{{.COVERAGE_FILE}}
        
        echo
        echo "🧾 Общее покрытие по всем модулям:"
        go tool cover -func={{.COVERAGE_DIR}}/{{.COVERAGE_FILE}} | tail -n1

  coverage:html:
    desc: "Генерация HTML-отчёта покрытия и открытие его в браузере"
    deps: [ test-coverage ]
    cmds:
      - |
        OUTPUT={{.COVERAGE_DIR}}/coverage.html
        echo "🌐 Генерируем HTML-отчёт..."
        go tool cover -html={{.COVERAGE_DIR}}/{{.COVERAGE_FILE}} -o $OUTPUT

        echo "🚀 Открываем $OUTPUT"
        if command -v open &> /dev/null; then
          open $OUTPUT || echo "📂 Отчёт сохранён в $OUTPUT (не удалось открыть автоматически)"
        elif command -v xdg-open &> /dev/null; then
          xdg-open $OUTPUT || echo "📂 Отчёт сохранён в $OUTPUT (не удалось открыть автоматически)"
        else
          echo "📂 Отчёт сохранён в $OUTPUT (открой вручную)"
        fi

  test:
    desc: "Запуск юнит-тестов для всех модулей"
    summary: |
      Запускает юнит-тесты для указанных модулей проекта.
      Можно указать конкретные модули через переменную MODULES.
    cmds:
      - |
        ERR=0
        for mod in {{.MODULES}}; do
          if [ ! -d "$mod" ] || [ ! -f "$mod/go.mod" ]; then
            echo "⏭️  Пропускаем $mod: модуль не найден"
            continue
          fi

          if ! find "$mod" -type f -name '*.go' | grep -q .; then
            echo "⏭️  Пропускаем $mod: нет Go-файлов"
            continue
          fi

          echo "🧪 Тестируем модуль $mod"
          go test -v ./$mod/... || ERR=1
        done
        exit $ERR

  deps:update:
    desc: "Обновление зависимостей в go.mod во всех модулях"
    cmds:
      - |
        echo "🔄 Обновление зависимостей в go.mod во всех модулях"
        for mod in {{.MODULES}}; do
          if [ -d "$mod" ]; then
            echo "🔄 Обновление зависимостей в $mod"
            (cd "$mod" && go mod tidy -compat=1.26) || exit 1
          fi
        done

  infra:network:
    desc: "Создание внешней Docker-сети для локального окружения"
    cmds:
      - |
        docker network inspect {{.COMPOSE_NETWORK}} >/dev/null 2>&1 || docker network create {{.COMPOSE_NETWORK}}

  compose:up:inventory:
    desc: "Запуск Postgres для InventoryService"
    deps: [infra:network]
    preconditions:
      - sh: test -f {{.INVENTORY_ENV_FILE}}
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
      - sh: test -f {{.INVENTORY_COMPOSE_FILE}}
        msg: "Не найден {{.INVENTORY_COMPOSE_FILE}}"
    cmds:
      - |
        docker compose --env-file {{.INVENTORY_ENV_FILE}} -f {{.INVENTORY_COMPOSE_FILE}} config --quiet
        docker compose --env-file {{.INVENTORY_ENV_FILE}} -f {{.INVENTORY_COMPOSE_FILE}} up -d --wait

  compose:down:inventory:
    desc: "Остановка Postgres для InventoryService"
    preconditions:
      - sh: test -f {{.INVENTORY_ENV_FILE}}
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
      - sh: test -f {{.INVENTORY_COMPOSE_FILE}}
        msg: "Не найден {{.INVENTORY_COMPOSE_FILE}}"
    cmds:
      - |
        docker compose --env-file {{.INVENTORY_ENV_FILE}} -f {{.INVENTORY_COMPOSE_FILE}} down

  compose:up:order:
    desc: "Запуск Postgres для OrderService"
    deps: [infra:network]
    preconditions:
      - sh: test -f {{.ORDER_ENV_FILE}}
        msg: "Создай deploy/env/order.env из order.env.example"
      - sh: test -f {{.ORDER_COMPOSE_FILE}}
        msg: "Не найден {{.ORDER_COMPOSE_FILE}}"
    cmds:
      - |
        docker compose --env-file {{.ORDER_ENV_FILE}} -f {{.ORDER_COMPOSE_FILE}} config --quiet
        docker compose --env-file {{.ORDER_ENV_FILE}} -f {{.ORDER_COMPOSE_FILE}} up -d --wait

  compose:down:order:
    desc: "Остановка Postgres для OrderService"
    preconditions:
      - sh: test -f {{.ORDER_ENV_FILE}}
        msg: "Создай deploy/env/order.env из order.env.example"
      - sh: test -f {{.ORDER_COMPOSE_FILE}}
        msg: "Не найден {{.ORDER_COMPOSE_FILE}}"
    cmds:
      - |
        docker compose --env-file {{.ORDER_ENV_FILE}} -f {{.ORDER_COMPOSE_FILE}} down

  env:up:
    desc: "Запуск локальной инфраструктуры: inventory DB и order DB"
    cmds:
      - task: compose:up:inventory
      - task: compose:up:order

  env:down:
    desc: "Остановка локальной инфраструктуры"
    cmds:
      - task: compose:down:order
      - task: compose:down:inventory

  env:bootstrap:
    desc: "Подготовка локального окружения: infra up и миграции"
    cmds:
      - task: env:up
      - task: db:migrate:all
      - |
        echo "✅ Инфраструктура поднята, миграции применены."

  run:inventory:
    desc: "Запуск InventoryService локально"
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        go run ./inventory/cmd

  run:payment:
    desc: "Запуск PaymentService локально"
    dotenv: ['deploy/env/payment.env']
    preconditions:
      - sh: test -f deploy/env/payment.env
        msg: "Создай deploy/env/payment.env из payment.env.example"
    cmds:
      - |
        (cd payment && go run ./cmd)
  
  run:order:
    desc: "Запуск OrderService локально"
    dotenv: ['deploy/env/order.env']
    preconditions:
      - sh: test -f deploy/env/order.env
        msg: "Создай deploy/env/order.env из order.env.example"
    cmds:
      - |
        go run ./order/cmd
  install-goose:
    desc: "Установка goose в каталог bin"
    cmds:
      - |
        [ -f {{.GOOSE}} ] || {
          echo "📦 Устанавливаем goose {{.GOOSE_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
        }
    status:
      - test -x {{.GOOSE}}

  db:migrate:inventory:
    desc: "Запуск миграций inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          up

  db:status:inventory:
    desc: "Статус миграций inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          status

  db:rollback:inventory:
    desc: "Откат последней миграции inventory"
    deps: [install-goose]
    dotenv: ['deploy/env/inventory.env']
    preconditions:
      - sh: test -f deploy/env/inventory.env
        msg: "Создай deploy/env/inventory.env из inventory.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir inventory/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          down

  db:migrate:order:
    desc: "Запуск миграций order"
    deps: [install-goose]
    dotenv: ['deploy/env/order.env']
    preconditions:
      - sh: test -f deploy/env/order.env
        msg: "Создай deploy/env/order.env из order.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir order/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          up

  db:migrate:all:
    desc: "Запуск миграций всех локальных БД"
    aliases: [db:migrate]
    cmds:
      - task: db:migrate:inventory
      - task: db:migrate:order

  db:status:order:
    desc: "Статус миграций order"
    deps: [install-goose]
    dotenv: ['deploy/env/order.env']
    preconditions:
      - sh: test -f deploy/env/order.env
        msg: "Создай deploy/env/order.env из order.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir order/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          status

  db:rollback:order:
    desc: "Откат последней миграции order"
    deps: [install-goose]
    dotenv: ['deploy/env/order.env']
    preconditions:
      - sh: test -f deploy/env/order.env
        msg: "Создай deploy/env/order.env из order.env.example"
    cmds:
      - |
        {{.GOOSE}} -dir order/migrations postgres \
          "host=$POSTGRES_HOST port=$POSTGRES_PORT user=$POSTGRES_USER password=$POSTGRES_PASSWORD dbname=$POSTGRES_DB sslmode=$POSTGRES_SSL_MODE" \
          down

  grpcurl:install:
    desc: "Установка grpcurl в каталог bin"
    cmds:
      - |
        [ -f {{.GRPCURL}} ] || {
          echo '📦 Устанавливаем grpcurl {{.GRPCURL_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/fullstorydev/grpcurl/cmd/grpcurl@{{.GRPCURL_VERSION}}
        }
    status:
      - test -x {{.GRPCURL}}

  test-api:
    desc: "Ручная проверка Inventory, Payment и Order API"
    deps: [ grpcurl:install ]
    cmds:
      - |
        set -e

        echo "🧪 Проверяем InventoryService через gRPC"
        PARTS_RESPONSE=$({{.GRPCURL}} -plaintext -d '{"filter":{}}' localhost:50051 inventory.v1.InventoryService/ListParts)
        PART_UUID=$(echo "$PARTS_RESPONSE" | grep -o '"uuid": "[^"]*' | head -1 | cut -d'"' -f4)

        if [ -z "$PART_UUID" ]; then
          echo "❌ Не удалось получить UUID детали из InventoryService"
          echo "$PARTS_RESPONSE"
          exit 1
        fi

        echo "✅ Найдена деталь: $PART_UUID"

        USER_UUID=$(uuidgen | tr '[:upper:]' '[:lower:]')

        echo "🧪 Создаем заказ через OrderService"
        ORDER_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER_UUID=$(echo "$ORDER_RESPONSE" | grep -o '"order_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER_UUID" ]; then
          ORDER_UUID=$(echo "$ORDER_RESPONSE" | grep -o '"order_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$ORDER_UUID" ]; then
          echo "❌ Не удалось создать заказ или извлечь order_uuid"
          echo "$ORDER_RESPONSE"
          exit 1
        fi

        echo "✅ Создан заказ: $ORDER_UUID"

        echo "🧪 Получаем заказ"
        ORDER_INFO_RESPONSE=$(curl -s -X GET "http://localhost:8080/api/v1/orders/$ORDER_UUID")
        ORDER_STATUS=$(echo "$ORDER_INFO_RESPONSE" | grep -o '"status":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER_STATUS" ]; then
          ORDER_STATUS=$(echo "$ORDER_INFO_RESPONSE" | grep -o '"status": "[^"]*' | cut -d'"' -f4)
        fi

        if [ "$ORDER_STATUS" != "PENDING_PAYMENT" ]; then
          echo "❌ Ожидался статус PENDING_PAYMENT, получен: $ORDER_STATUS"
          echo "$ORDER_INFO_RESPONSE"
          exit 1
        fi

        echo "✅ Начальный статус корректный: $ORDER_STATUS"

        echo "🧪 Оплачиваем заказ"
        PAY_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders/$ORDER_UUID/pay" \
          -H "Content-Type: application/json" \
          -d '{"payment_method":"CARD"}')
        TRANSACTION_UUID=$(echo "$PAY_RESPONSE" | grep -o '"transaction_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$TRANSACTION_UUID" ]; then
          TRANSACTION_UUID=$(echo "$PAY_RESPONSE" | grep -o '"transaction_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$TRANSACTION_UUID" ]; then
          echo "❌ Не удалось оплатить заказ или извлечь transaction_uuid"
          echo "$PAY_RESPONSE"
          exit 1
        fi

        echo "✅ Заказ оплачен, transaction_uuid: $TRANSACTION_UUID"

        echo "🧪 Создаем второй заказ для отмены"
        ORDER2_RESPONSE=$(curl -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER2_UUID=$(echo "$ORDER2_RESPONSE" | grep -o '"order_uuid":"[^"]*' | cut -d'"' -f4)

        if [ -z "$ORDER2_UUID" ]; then
          ORDER2_UUID=$(echo "$ORDER2_RESPONSE" | grep -o '"order_uuid": "[^"]*' | cut -d'"' -f4)
        fi

        if [ -z "$ORDER2_UUID" ]; then
          echo "❌ Не удалось создать второй заказ"
          echo "$ORDER2_RESPONSE"
          exit 1
        fi

        CANCEL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://localhost:8080/api/v1/orders/$ORDER2_UUID/cancel")

        if [ "$CANCEL_STATUS" != "204" ]; then
          echo "❌ Ожидался HTTP 204 при отмене, получен: $CANCEL_STATUS"
          exit 1
        fi

        echo "✅ Второй заказ отменен"
        echo "🎉 Базовая API-проверка завершена"
