services:
  payment:
    build:
      context: ../../..
      dockerfile: deploy/docker/payment/Dockerfile
    container_name: payment
    env_file:
      - .env
    ports:
      - "${PAYMENT_GRPC_PORT}:${PAYMENT_GRPC_PORT}"
    restart: on-failure
    networks:
      - microservices-net

networks:
  microservices-net:
    external: true
