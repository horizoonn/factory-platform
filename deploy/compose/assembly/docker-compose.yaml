services:
  assembly:
    build:
      context: ../../..
      dockerfile: deploy/docker/assembly/Dockerfile
    container_name: assembly
    env_file:
      - .env
    environment:
      KAFKA_BROKERS: ${DOCKER_KAFKA_BROKERS}
      POSTGRES_HOST: ${DOCKER_POSTGRES_HOST}
      POSTGRES_PORT: ${DOCKER_POSTGRES_PORT}
      ASSEMBLY_MIGRATIONS_DIR: ${DOCKER_MIGRATIONS_DIR}
    depends_on:
      postgres-assembly:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservices-net

  postgres-assembly:
    image: postgres:18.1-bookworm
    container_name: postgres-assembly
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_BIND_HOST}:${POSTGRES_EXTERNAL_PORT}:${DOCKER_POSTGRES_PORT}
    volumes:
      - postgres_assembly_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - microservices-net

volumes:
  postgres_assembly_data:

networks:
  microservices-net:
    external: true
